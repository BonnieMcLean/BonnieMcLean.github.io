<script>
//REMEMBER TO UPDATE THE ARRAY YOU'RE SHUFFLING SO IT'S ALSO 15 TRIALS
var trialOrder = shuffle([4,3,2,1]);
var curTrial=0;
//REMEMBER TO UPDATE THE NUMBER OF TRIALS BELOW (YOU SHOULD HAVE 15)
var nTrials=4
var startTrialTime;
function buttonClicked() {
	var curTime = new Date();
	var rt = curTime - startTrialTime;
	$('#reactionTime' + trialOrder[curTrial]).val(rt);
	// If you want to change another attribute of an object use this
	//$('#reactionTime'+curTrial).attr("value",rt);
	console.log(rt);
	$('#trial'+trialOrder[curTrial]).hide();
	curTrial++;
	if (curTrial >= nTrials) {
		$('#submitButton').show();
	} else {
		$('#trial'+trialOrder[curTrial]).show();
		startTrialTime = new Date();
	}
}
function showFirstTrial() {
	$('#trial'+trialOrder[0]).show();
	startTrialTime = new Date();
	$('#instructions').hide();
}

/* Fisher-Yates shuffle */
function shuffle(o){
    for(var j, x, i = o.length; i; j = Math.floor(Math.random() * i), x = o[--i], o[i] = o[j], o[j] = x);
    return o;
}

$('#startExperiment').click(showFirstTrial);
$('.responseButton').click(buttonClicked)

</script>
